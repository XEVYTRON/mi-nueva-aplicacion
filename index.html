<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Puntos Excel</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <style>
        :root { --primary: #4CAF50; --bg: #f0f2f5; --card: #fff; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 70px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; }
        .card { background: var(--card); margin: 10px; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-add { background: #2196F3; color: white; }
        .btn-edit { background: #FF9800; color: white; }
        .btn-del { background: #f44336; color: white; width: auto; padding: 5px 10px; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 60px; }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 12px; color: #666; cursor: pointer; }
        .tab.active { color: var(--primary); font-weight: bold; }
        
        .view { display: none; }
        .view.active { display: block; }
        
        .puntos-circle { width: 80px; height: 80px; border: 4px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin: 10px auto; color: var(--primary); }
        .item-alimento { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header id="header-title">Calculadora</header>

<div id="view-calc" class="view active">
    <div class="card">
        <label>Nombre del Alimento</label>
        <input type="text" id="name" placeholder="Ej: Pollo">
        <label>Gramos a calcular</label>
        <input type="number" id="grams" value="100" oninput="runCalc()">
        <label>Proteínas (por 100g)</label>
        <input type="number" id="prot" oninput="runCalc()">
        <label>Grasas (por 100g)</label>
        <input type="number" id="fat" oninput="runCalc()">
        <label>Calorías (por 100g)</label>
        <input type="number" id="cal" oninput="runCalc()">
        
        <div class="puntos-circle" id="res-puntos">0</div>
        <input type="hidden" id="edit-id">
        <button class="btn btn-main" id="btn-save" onclick="saveFood()">💾 Guardar Alimento</button>
    </div>
</div>

<div id="view-list" class="view">
    <div class="card">
        <div id="food-list"></div>
    </div>
</div>

<div id="view-daily" class="view">
    <div class="card" style="text-align: center;">
        <h2>Puntos Hoy</h2>
        <div class="puntos-circle" id="daily-rem">22</div>
        <p>Restantes de 22</p>
        <button class="btn btn-del" onclick="resetDay()">Resetear Día</button>
    </div>
    <div class="card" id="daily-log"></div>
</div>

<nav class="tab-bar">
    <div class="tab active" onclick="showV('calc')">🧮 Calc</div>
    <div class="tab" onclick="showV('list')">💾 Mis Alimentos</div>
    <div class="tab" onclick="showV('daily')">📅 Hoy</div>
</nav>

<script>
    let foods = JSON.parse(localStorage.getItem('myFoods') || '[]');
    let dailyPoints = JSON.parse(localStorage.getItem('dailyLog') || '{"total":22, "used":0, "items":[]}');

    // LA FÓRMULA DEL EXCEL
    function runCalc() {
        const g = parseFloat(document.getElementById('grams').value) || 0;
        const p = parseFloat(document.getElementById('prot').value) || 0;
        const f = parseFloat(document.getElementById('fat').value) || 0;
        const c = parseFloat(document.getElementById('cal').value) || 0;

        // Fórmula: ((P/11) + (F/9) + (C/70)) * (Gramos/100)
        let res = ((p/11) + (f/9) + (c/70)) * (g/100);
        document.getElementById('res-puntos').innerText = Math.round(res) || 0;
    }

    function saveFood() {
        const name = document.getElementById('name').value || 'Sin nombre';
        const id = document.getElementById('edit-id').value;
        const newFood = {
            id: id ? parseInt(id) : Date.now(),
            name: name,
            g: document.getElementById('grams').value,
            p: document.getElementById('prot').value,
            f: document.getElementById('fat').value,
            c: document.getElementById('cal').value,
            pts: document.getElementById('res-puntos').innerText
        };

        if(id) {
            foods = foods.map(f => f.id == id ? newFood : f);
        } else {
            foods.push(newFood);
        }

        localStorage.setItem('myFoods', JSON.stringify(foods));
        alert("¡Guardado!");
        clearForm();
        showV('list');
    }

    function renderList() {
        const container = document.getElementById('food-list');
        container.innerHTML = foods.length ? '' : 'No hay alimentos guardados.';
        foods.forEach(f => {
            container.innerHTML += `
                <div class="item-alimento">
                    <div>
                        <strong>${f.name}</strong><br>
                        <small>${f.pts} pts (${f.g}g)</small>
                    </div>
                    <div>
                        <button class="btn btn-edit" style="width:auto" onclick="editF(${f.id})">✏️</button>
                        <button class="btn btn-add" style="width:auto" onclick="eat(${f.id})">➕</button>
                    </div>
                </div>`;
        });
    }

    function editF(id) {
        const f = foods.find(x => x.id == id);
        document.getElementById('name').value = f.name;
        document.getElementById('grams').value = f.g;
        document.getElementById('prot').value = f.p;
        document.getElementById('fat').value = f.f;
        document.getElementById('cal').value = f.c;
        document.getElementById('edit-id').value = f.id;
        document.getElementById('btn-save').innerText = "✅ Actualizar Alimento";
        runCalc();
        showV('calc');
    }

    function eat(id) {
        const f = foods.find(x => x.id == id);
        const qty = prompt(`¿Cuántos gramos de ${f.name} has comido?`, f.g);
        if(qty) {
            // Recalcular puntos para la cantidad comida
            let ptsComidos = Math.round(((f.p/11) + (f.f/9) + (f.c/70)) * (qty/100));
            dailyPoints.used += ptsComidos;
            dailyPoints.items.push({name: f.name, pts: ptsComidos, qty: qty});
            localStorage.setItem('dailyLog', JSON.stringify(dailyPoints));
            alert(`Añadido: ${ptsComidos} puntos`);
            showV('daily');
        }
    }

    function renderDaily() {
        document.getElementById('daily-rem').innerText = 22 - dailyPoints.used;
        const log = document.getElementById('daily-log');
        log.innerHTML = '<h3>Consumo de hoy:</h3>';
        dailyPoints.items.forEach(i => {
            log.innerHTML += `<div class="item-alimento"><span>${i.name} (${i.qty}g)</span> <b>${i.pts} pts</b></div>`;
        });
    }

    function showV(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('header-title').innerText = v.toUpperCase();
        if(v == 'list') renderList();
        if(v == 'daily') renderDaily();
    }

    function clearForm() {
        document.getElementById('name').value = '';
        document.getElementById('edit-id').value = '';
        document.getElementById('btn-save').innerText = "💾 Guardar Alimento";
        runCalc();
    }

    function resetDay() {
        if(confirm("¿Borrar puntos de hoy?")) {
            dailyPoints.used = 0;
            dailyPoints.items = [];
            localStorage.setItem('dailyLog', JSON.stringify(dailyPoints));
            renderDaily();
        }
    }

    // Registro de Service Worker para Offline
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
