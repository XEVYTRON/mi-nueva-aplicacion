<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Puntos Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7B1FA2">
    <style>
        :root { --primary: #7B1FA2; --bg: #f4f7f9; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .card { background: var(--card); margin: 12px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--primary); color: white; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; padding: 20px; }
        #app-content { display: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card" style="width: 100%; max-width: 320px;">
        <h2 style="text-align:center; color:var(--primary);">Entrar</h2>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Contraseña">
        <button class="btn btn-save" id="btnLogin">Entrar</button>
        <button class="btn" id="btnSignup" style="background:#eee; margin-top:10px;">Crear Cuenta Nueva</button>
    </div>
</div>

<div id="app-content">
    <header>Mis Puntos Pro <button id="btnLogout" style="float:right; background:none; border:none; color:white; font-size:0.7rem;">Salir</button></header>
    <div class="card">¡Bienvenido! Ya estás dentro.</div>
    <nav style="position:fixed; bottom:0; width:100%; background:white; display:flex; height:60px; border-top:1px solid #eee;">
        <div onclick="alert('Funciona!')" style="flex:1; text-align:center; padding:15px;">Prueba</div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAwv0RBFiAk-frLYK0LDyCyRduL2IVqOME",
      authDomain: "mispuntos-ea353.firebaseapp.com",
      projectId: "mispuntos-ea353",
      storageBucket: "mispuntos-ea353.firebasestorage.app",
      messagingSenderId: "762879678681",
      appId: "1:762879678681:web:68a2bc4677e547a57b86c8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ESCUCHADORES DE EVENTOS (FORMA SEGURA)
    document.getElementById('btnLogin').addEventListener('click', () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Error: " + e.message));
    });

    document.getElementById('btnSignup').addEventListener('click', () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        createUserWithEmailAndPassword(auth, email, pass)
            .then(() => alert("¡Cuenta creada!"))
            .catch(e => alert("Error al registrar: " + e.message));
    });

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-content').style.display = 'none';
        }
    });
</script>
</body>
</html>
