<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puntos Pro (IndexedDB)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    <style>
        :root { --primary: #2196F3; --bg: #f4f7f9; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; color: #333; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { background: var(--card); margin: 12px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .res-container { text-align: center; background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid var(--primary); }
        .res-val { font-size: 2.2rem; font-weight: bold; color: var(--primary); display: block; }
        .btn { border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; display: block; text-align: center; text-decoration: none; }
        .btn-save { background: var(--primary); color: white; }
        .btn-edit { background: #FF9800; color: white; width: auto; padding: 8px; font-size: 0.8rem; }
        .btn-add { background: #4CAF50; color: white; width: auto; padding: 8px; font-size: 0.8rem; }
        .btn-del { background: #F44336; color: white; width: auto; padding: 8px; font-size: 0.8rem; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 65px; z-index: 100; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #888; cursor: pointer; }
        .tab.active { color: var(--primary); border-top: 3px solid var(--primary); }
        .view { display: none; padding: 5px; }
        .view.active { display: block; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .daily-circle { width: 100px; height: 100px; border: 5px solid var(--primary); border-radius: 50%; margin: 10px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .daily-circle span { font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>

<header>Calculadora Puntos Pro</header>

<div id="v-calc" class="view active">
    <div class="card">
        <label>Alimento</label><input type="text" id="c-name">
        <label>Calorías (100g)</label><input type="number" id="c-cal" oninput="doCalc()">
        <label>Grasas (100g)</label><input type="number" id="c-fat" oninput="doCalc()">
        <label>Gramos Porción</label><input type="number" id="c-gram" oninput="doCalc()">
        <div class="res-container">
            <span id="res-extra" style="font-size: 0.7rem;">Extra: 0</span><br>
            <span class="res-val" id="res-pts">0</span>
        </div>
        <input type="hidden" id="edit-id">
        <button class="btn btn-save" id="btn-save" onclick="save()">💾 Guardar Alimento</button>
        <button class="btn" id="btn-cancel" style="display:none; background:#ccc;" onclick="cancelEdit()">Cancelar</button>
    </div>
</div>

<div id="v-list" class="view">
    <div class="card">
        <input type="text" id="search" placeholder="🔍 Buscar..." oninput="renderList()">
        <div id="food-list"></div>
        <div style="display:flex; gap:5px; margin-top:15px;">
            <button class="btn" style="background:#9c27b0; color:white; font-size:0.7rem;" onclick="exportDB()">📥 Backup</button>
            <button class="btn" style="background:#607d8b; color:white; font-size:0.7rem;" onclick="document.getElementById('fIn').click()">📤 Restaurar</button>
            <input type="file" id="fIn" style="display:none" onchange="importDB(event)">
        </div>
    </div>
</div>

<div id="v-day" class="view">
    <div class="card" style="text-align:center;">
        <label>RESTANTES</label>
        <div class="daily-circle"><span id="d-rem">22</span></div>
        <p>Consumido: <b id="d-used">0</b> / 22</p>
    </div>
    <div class="card"><div id="day-log"></div><button class="btn" style="background:#eee; font-size:0.7rem; margin-top:10px;" onclick="resetDay()">Limpiar día</button></div>
</div>

<div id="v-hist" class="view"><div class="card"><div id="hist-list"></div></div></div>

<nav class="tab-bar">
    <div class="tab active" onclick="tab('calc')"><b>🧮</b>Calc</div>
    <div class="tab" onclick="tab('list')"><b>📖</b>Lista</div>
    <div class="tab" onclick="tab('day')"><b>🍴</b>Hoy</div>
    <div class="tab" onclick="tab('hist')"><b>📈</b>Hist</div>
</nav>

<script>
    let db;
    const request = indexedDB.open("PuntosSecureDB", 1);

    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("foods", { keyPath: "id", autoIncrement: true });
        db.createObjectStore("config", { keyPath: "key" });
    };

    request.onsuccess = e => {
        db = e.target.result;
        requestPersist();
        loadDay();
    };

    async function requestPersist() {
        if (navigator.storage && navigator.storage.persist) {
            const isPersisted = await navigator.storage.persist();
            console.log(`Persistencia concedida: ${isPersisted}`);
        }
    }

    function doCalc() {
        const c = parseFloat(document.getElementById('c-cal').value)||0, f = parseFloat(document.getElementById('c-fat').value)||0, g = parseFloat(document.getElementById('c-gram').value)||0;
        const extra = (c/50)+(f/12), pts = (extra*g)/100;
        document.getElementById('res-extra').innerText = "Extra: "+extra.toFixed(3);
        document.getElementById('res-pts').innerText = pts.toFixed(2);
        return pts.toFixed(2);
    }

    function save() {
        const id = document.getElementById('edit-id').value;
        const food = { name: document.getElementById('c-name').value||'Ali', cal: document.getElementById('c-cal').value, fat: document.getElementById('c-fat').value, gram: document.getElementById('c-gram').value, pts: document.getElementById('res-pts').innerText };
        if(id) food.id = parseInt(id);
        const tx = db.transaction("foods", "readwrite");
        tx.objectStore("foods").put(food);
        tx.oncomplete = () => { cancelEdit(); tab('list'); };
    }

    function renderList() {
        const q = document.getElementById('search').value.toLowerCase();
        const div = document.getElementById('food-list');
        div.innerHTML = '';
        db.transaction("foods").objectStore("foods").getAll().onsuccess = e => {
            e.target.result.filter(f => f.name.toLowerCase().includes(q)).forEach(f => {
                div.innerHTML += `<div class="item"><div><b>${f.name}</b><span>${f.pts} pts (${f.gram}g)</span></div>
                <div style="display:flex; gap:5px;"><button class="btn-edit" onclick="prepEdit(${f.id})">✏️</button><button class="btn-add" onclick="addToDay(${f.id})">➕</button><button class="btn-del" onclick="delFood(${f.id})">🗑️</button></div></div>`;
            });
        };
    }

    let dayData = { date: "", used: 0, items: [] };
    function loadDay() {
        db.transaction("config").objectStore("config").get("day").onsuccess = e => {
            if(e.target.result) dayData = e.target.result.val;
            checkDate();
        };
    }

    function checkDate() {
        const today = new Date().toLocaleDateString();
        if(dayData.date !== today && dayData.date !== "") {
            saveToHistory(dayData);
            dayData = { date: today, used: 0, items: [] };
            saveDay();
        } else if(dayData.date === "") { dayData.date = today; saveDay(); }
    }

    function saveDay() { db.transaction("config", "readwrite").objectStore("config").put({key: "day", val: dayData}); }

    function addToDay(id) {
        db.transaction("foods").objectStore("foods").get(id).onsuccess = e => {
            const f = e.target.result;
            const gr = prompt(`¿Gramos de ${f.name}?`, f.gram);
            if(gr) {
                const pts = (((f.cal/50)+(f.fat/12))*gr/100).toFixed(2);
                dayData.used += parseFloat(pts);
                dayData.items.unshift({name: f.name, pts, gr});
                saveDay(); tab('day');
            }
        };
    }

    function renderDay() {
        document.getElementById('d-rem').innerText = (22 - dayData.used).toFixed(1);
        document.getElementById('d-used').innerText = dayData.used.toFixed(1);
        const log = document.getElementById('day-log'); log.innerHTML = '';
        dayData.items.forEach(i => log.innerHTML += `<div class="item"><span>${i.name} (${i.gr}g)</span><b>${i.pts}</b></div>`);
    }

    function tab(v) {
        document.querySelectorAll('.view, .tab').forEach(x => x.classList.remove('active'));
        document.getElementById('v-'+v).classList.add('active');
        if(v==='list') renderList(); if(v==='day') renderDay(); if(v==='hist') renderHist();
    }

    function prepEdit(id) {
        db.transaction("foods").objectStore("foods").get(id).onsuccess = e => {
            const f = e.target.result;
            document.getElementById('c-name').value = f.name; document.getElementById('c-cal').value = f.cal;
            document.getElementById('c-fat').value = f.fat; document.getElementById('c-gram').value = f.gram;
            document.getElementById('edit-id').value = f.id; document.getElementById('btn-save').innerText = "✅ Actualizar";
            document.getElementById('btn-cancel').style.display = 'block'; doCalc(); tab('calc');
        };
    }

    function cancelEdit() { document.getElementById('c-name').value=''; document.getElementById('edit-id').value=''; document.getElementById('btn-save').innerText="💾 Guardar"; document.getElementById('btn-cancel').style.display='none'; doCalc(); }
    function delFood(id) { if(confirm('¿Borrar?')) { db.transaction("foods", "readwrite").objectStore("foods").delete(id); renderList(); } }
    function resetDay() { if(confirm('¿Reiniciar hoy?')) { dayData.used = 0; dayData.items = []; saveDay(); renderDay(); } }
    
    function saveToHistory(data) {
        db.transaction("config").objectStore("config").get("history").onsuccess = e => {
            let h = e.target.result ? e.target.result.val : [];
            h.push(data);
            db.transaction("config", "readwrite").objectStore("config").put({key: "history", val: h});
        };
    }

    function renderHist() {
        db.transaction("config").objectStore("config").get("history").onsuccess = e => {
            const h = e.target.result ? e.target.result.val : [];
            const div = document.getElementById('hist-list'); div.innerHTML = h.length ? '' : 'Vacío';
            h.slice().reverse().forEach(x => div.innerHTML += `<div class="item"><b>${x.date}</b><span>${x.used.toFixed(1)} pts</span></div>`);
        };
    }

    function exportDB() {
        db.transaction("foods").objectStore("foods").getAll().onsuccess = e => {
            const blob = new Blob([JSON.stringify(e.target.result)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'puntos_db.json'; a.click();
        };
    }

    function importDB(ev) {
        const reader = new FileReader();
        reader.onload = e => {
            const data = JSON.parse(e.target.result);
            const tx = db.transaction("foods", "readwrite");
            data.forEach(f => tx.objectStore("foods").put(f));
            tx.oncomplete = () => renderList();
        };
        reader.readAsText(ev.target.files[0]);
    }
</script>
</body>
</html>
