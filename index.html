<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Puntos Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7B1FA2">
    <style>
        :root { --primary: #7B1FA2; --bg: #f4f7f9; --card: #ffffff; --accent: #CE93D8; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { background: var(--card); margin: 12px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .res-container { text-align: center; background: #f3e5f5; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid var(--primary); }
        .res-val { font-size: 4.5rem; font-weight: 900; color: var(--primary); display: block; line-height: 1; margin: 5px 0; }
        .btn { border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 10px; transition: 0.2s; }
        .btn-save { background: var(--primary); color: white; }
        .btn-edit { background: #FF9800; color: white; padding: 6px 10px; font-size: 0.8rem; border-radius: 5px; border:none; }
        .btn-add { background: #4CAF50; color: white; padding: 6px 10px; font-size: 0.8rem; border-radius: 5px; border:none; }
        .btn-del { background: #F44336; color: white; padding: 6px 10px; font-size: 0.8rem; border-radius: 5px; border:none; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 65px; z-index: 100; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #888; cursor: pointer; }
        .tab.active { color: var(--primary); border-top: 3px solid var(--primary); font-weight: bold; }
        .view { display: none; animation: fadeIn 0.2s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .actions { display: flex; gap: 8px; align-items: center; }
        .hist-item { border: 1px solid #ddd; margin-bottom: 10px; border-radius: 10px; background: white; }
        .hist-head { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .hist-body { padding: 0 15px 15px 15px; display: none; border-top: 1px solid #eee; font-size: 0.9rem; color: #555; }
        .buy-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px dotted #ccc; }
        .buy-item.done span { text-decoration: line-through; color: #aaa; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; padding: 20px; }
        #app-content { display: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card" style="width: 100%; max-width: 320px;">
        <h2 style="text-align:center; color:var(--primary);">Acceso Privado</h2>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Contraseña">
        
        <button class="btn btn-save" onclick="window.entrar()">Entrar</button>
        <button class="btn" onclick="window.registrar()" style="background:#eee; margin-top:10px;">Crear Cuenta Nueva</button>

        <div style="text-align:center; margin-top:25px;">
            <button onclick="limpiarApp()" style="background:transparent; color:#888; border:1px solid #ddd; padding:8px 15px; border-radius:20px; font-size:0.75rem;">🔄 ¿No funciona? Limpiar App</button>
        </div>
        <div style="text-align:center; font-size:0.7rem; color:#aaa; margin-top:10px;">Versión 3.0 (Catálogo Completo)</div>
    </div>
</div>

<div id="app-content">
    <header>
        <span>Mis Puntos Pro</span>
        <button onclick="window.salir()" style="background:none; border:none; color:white; font-size:0.8rem; text-decoration: underline;">Salir</button>
    </header>

    <div id="v-calc" class="view active">
        <div class="card">
            <label>Nombre del Alimento</label><input type="text" id="c-name" placeholder="Ej: Pechuga">
            <label>Calorías (100g)</label><input type="number" id="c-cal" oninput="window.doCalc()">
            <label>Grasas (100g)</label><input type="number" id="c-fat" oninput="window.doCalc()">
            <label>Gramos Porción</label><input type="number" id="c-gram" oninput="window.doCalc()">
            <div class="res-container">
                <span id="res-extra" style="font-size: 0.7rem; color: #666;">Extra: 0.000</span><br>
                <span class="res-val" id="res-pts">0</span>
                <span style="font-weight: bold; color: var(--primary)">PUNTOS</span>
            </div>
            <input type="hidden" id="edit-id">
            <button class="btn btn-save" onclick="window.saveFood()">💾 Guardar en mi lista</button>
        </div>
    </div>

    <div id="v-list" class="view">
        <div class="card">
            <button onclick="window.importarLote()" style="background:var(--primary); color:white; padding:12px; width:100%; border:none; border-radius:8px; margin-bottom:15px; font-weight:bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">📥 Importar Todo el Libro (PDF)</button>
            <input type="text" id="search" placeholder="🔍 Buscar alimento..." oninput="window.renderList()">
            <div id="food-list">Cargando...</div>
        </div>
    </div>

    <div id="v-day" class="view">
        <div class="card" style="text-align:center;">
            <label style="color:var(--primary)">PUNTOS RESTANTES</label>
            <span class="res-val" id="d-rem">22</span>
            <p>Gastado: <b id="d-used" style="color:var(--primary)">0</b> de 22 pts</p>
        </div>
        <div class="card">
            <label>RESUMEN DE HOY:</label>
            <div id="day-log"></div>
            <button class="btn" style="background:#f3e5f5; color:var(--primary); margin-top:20px; font-size:0.8rem;" onclick="window.resetDay()">Borrar todo el día</button>
        </div>
    </div>

    <div id="v-buy" class="view">
        <div class="card">
            <label>Añadir a la lista</label>
            <div style="display:flex; gap:8px;">
                <input type="text" id="buy-input" placeholder="Escribir producto..." style="margin:0;">
                <button class="btn-add" onclick="window.addBuyItem()" style="padding:0 20px; font-size:1.5rem;">+</button>
            </div>
            <label style="margin-top:10px;">O elegir de mis alimentos:</label>
            <select id="buy-select" onchange="document.getElementById('buy-input').value = this.value"><option value="">-- Seleccionar --</option></select>
        </div>
        <div class="card">
            <label>🛒 PENDIENTE</label><div id="buy-list-pending"></div>
            <label style="margin-top:20px;">✅ COMPRADO</label><div id="buy-list-done"></div>
        </div>
    </div>

    <div id="v-hist" class="view"><div class="card"><label>HISTORIAL POR DÍAS</label><div id="hist-list"></div></div></div>

    <nav class="tab-bar">
        <div class="tab active" onclick="window.tab('calc')"><span>🧮</span>Calc</div>
        <div class="tab" onclick="window.tab('list')"><span>📖</span>Lista</div>
        <div class="tab" onclick="window.tab('day')"><span>🍴</span>Hoy</div>
        <div class="tab" onclick="window.tab('buy')"><span>🛒</span>Compra</div>
        <div class="tab" onclick="window.tab('hist')"><span>📈</span>Hist</div>
    </nav>
</div>

<script>
    function limpiarApp() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let r of registrations) { r.unregister(); }
                window.location.href = window.location.href.split('?')[0] + '?t=' + new Date().getTime();
            });
        } else { window.location.reload(true); }
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, doc, setDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAwv0RBFiAk-frLYK0LDyCyRduL2IVqOME",
      authDomain: "mispuntos-ea353.firebaseapp.com",
      projectId: "mispuntos-ea353",
      storageBucket: "mispuntos-ea353.firebasestorage.app",
      messagingSenderId: "762879678681",
      appId: "1:762879678681:web:68a2bc4677e547a57b86c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let userUID = null, foods = [], buyList = [], dayData = { used: 0, items: [], date: new Date().toLocaleDateString() };

    window.entrar = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if (!email || !pass) return alert("Escribe tu correo y contraseña.");
        try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Fallo al entrar: " + e.message); }
    };

    window.registrar = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if (!email || !pass) return alert("Escribe tu correo y contraseña.");
        try { await createUserWithEmailAndPassword(auth, email, pass); alert("¡Cuenta creada con éxito!"); } catch (e) { alert("Fallo al registrar: " + e.message); }
    };

    window.salir = () => { signOut(auth); };

    onAuthStateChanged(auth, (user) => {
        if (user) { 
            userUID = user.uid; document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-content').style.display = 'block'; iniciarApp(); 
        } else { 
            userUID = null; document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app-content').style.display = 'none'; 
        }
    });

    // --- CATÁLOGO GIGANTE DEL PDF ---
    window.importarLote = async () => {

            // CERO PUNTOS
            { name: "Verduras, Hortalizas (Acelga, Ajo, Apio, Brócoli, Calabacín, Cebolla, Champiñón, Lechuga, Pepino, Pimiento, Tomate, Zanahoria...)", qty: 1, unit: "ración", pts: 0 },
            { name: "Frutas naturales (Manzana, Pera, Plátano, Naranja...)", qty: 1, unit: "ud", pts: 0 },
            { name: "Clara de huevo", qty: 1, unit: "ud", pts: 0 },
            { name: "Refresco Light/Zero (Cola, Naranja, Limón)", qty: 1, unit: "lata", pts: 0 },

            { name: "Edulcorante, Sacarina, Estevia", qty: 1, unit: "ración", pts: 0 },
            { name: "Kétchup light", qty: 2, unit: "ct", pts: 0 },
            { name: "Mermelada Light", qty: 2, unit: "ct", pts: 0 },
            { name: "Salsa de soja", qty: 1, unit: "cd", pts: 0 },
            
            // APERITIVOS Y CONDIMENTOS

            { name: "Galletitas saladas cracker", qty: 2, unit: "ud", pts: 1.5 },
            { name: "Kikos", qty: 30, unit: "g", pts: 3 },
            { name: "Nachos", qty: 50, unit: "g", pts: 5 },
            { name: "Palomitas de Maíz con aceite y sal", qty: 10, unit: "g", pts: 1.5 },
            { name: "Patatas chips", qty: 30, unit: "g", pts: 4 },
            { name: "Kétchup normal", qty: 2, unit: "ct", pts: 1 },
            { name: "Mayonesa normal", qty: 1, unit: "ct", pts: 1 },
            { name: "Mayonesa Light", qty: 1, unit: "ct", pts: 0.5 },

            { name: "Ala de pollo", qty: 1, unit: "ud", pts: 2 },
            { name: "Pechuga de Pollo o Pavo (sin piel)", qty: 100, unit: "g", pts: 2 },
            { name: "Pavo sin piel", qty: 100, unit: "g", pts: 1.5 },
            { name: "Salchicha de Pavo/Pollo", qty: 1, unit: "ud", pts: 1.5 },
            { name: "Salchicha Frankfurt cerdo", qty: 1, unit: "ud", pts: 3 },
            { name: "Entrecot de Ternera o Buey", qty: 120, unit: "g", pts: 5 },

            { name: "Costilla de Cerdo", qty: 100, unit: "g", pts: 7 },
            { name: "Panceta de cerdo", qty: 50, unit: "g", pts: 9 },
            { name: "Costilla de Cordero", qty: 100, unit: "g", pts: 5 },
            { name: "Huevo de gallina L", qty: 1, unit: "ud", pts: 2 },

            // CHARCUTERÍA
            { name: "Bacon", qty: 40, unit: "g", pts: 5 },
            { name: "Chorizo curado", qty: 25, unit: "g", pts: 2.5 },
            { name: "Jamón cocido extra", qty: 50, unit: "g", pts: 1 },
            { name: "Jamón curado (sin grasa)", qty: 50, unit: "g", pts: 2 },
            { name: "Jamón curado (con grasa)", qty: 50, unit: "g", pts: 3.5 },
            { name: "Lomo embuchado", qty: 30, unit: "g", pts: 2 },
            { name: "Mortadela", qty: 50, unit: "g", pts: 3 },
            { name: "Salami", qty: 25, unit: "g", pts: 3 },

            { name: "Atún fresco", qty: 100, unit: "g", pts: 3 },

            { name: "Atún en conserva (aceite)", qty: 1, unit: "lata", pts: 2.5 },
            { name: "Bacalao fresco", qty: 120, unit: "g", pts: 2 },
            { name: "Calamares, sepia, chipirones", qty: 150, unit: "g", pts: 2 },
            { name: "Gambas o Langostinos", qty: 250, unit: "g", pts: 2 },
            { name: "Merluza fresca", qty: 120, unit: "g", pts: 2 },
            { name: "Salmón fresco", qty: 100, unit: "g", pts: 4 },
            { name: "Sardinas en lata (aceite)", qty: 1, unit: "lata", pts: 3 },
            { name: "Palitos de cangrejo (Surimi)", qty: 4, unit: "ud", pts: 1 },
            { name: "Fritura de pescado rebozado", qty: 150, unit: "g", pts: 7 },

            // FÉCULAS, ARROCES, PAN
            { name: "Arroz (crudo)", qty: 50, unit: "g", pts: 3 },
            { name: "Pasta (cruda)", qty: 30, unit: "g", pts: 2 },
            { name: "Garbanzos o Lentejas (crudos)", qty: 50, unit: "g", pts: 1.5 },
            { name: "Patata cocida", qty: 100, unit: "g", pts: 1 },
            { name: "Patatas fritas caseras", qty: 100, unit: "g", pts: 8 },
            { name: "Pan de barra blanca", qty: 50, unit: "g", pts: 2.5 },
            { name: "Pan de barra integral", qty: 50, unit: "g", pts: 1.5 },
            { name: "Pan de molde", qty: 1, unit: "rebanada", pts: 1.5 },
            { name: "Pan de hamburguesa", qty: 1, unit: "ud", pts: 3.5 },
            { name: "Masa para Pizza", qty: 40, unit: "g", pts: 2.5 },

            // LÁCTEOS Y BEBIDAS
            { name: "Leche entera", qty: 200, unit: "ml", pts: 3 },
            { name: "Leche semidesnatada", qty: 200, unit: "ml", pts: 2 },
            { name: "Leche desnatada", qty: 200, unit: "ml", pts: 1 },
            { name: "Yogur entero natural", qty: 1, unit: "ud", pts: 1.5 },
            { name: "Yogur griego", qty: 1, unit: "ud", pts: 3 },
            { name: "Bebida Vegetal (Soja, Avena...)", qty: 200, unit: "ml", pts: 3 },
            { name: "Cerveza rubia o negra", qty: 1, unit: "lata", pts: 2 },
            { name: "Cerveza 0,0%", qty: 1, unit: "lata", pts: 1 },
            { name: "Vino blanco, tinto, rosado", qty: 1, unit: "copa", pts: 1.5 },
            { name: "Zumo de frutas envasado", qty: 200, unit: "ml", pts: 1.5 },
            { name: "Café / Té / Infusiones", qty: 1, unit: "taza", pts: 0 },

            // QUESOS
            { name: "Queso Burgos", qty: 30, unit: "g", pts: 2 },
            { name: "Queso Curado, Manchego o Parmesano", qty: 30, unit: "g", pts: 3 },
            { name: "Queso Edam, Gouda, Cheddar", qty: 30, unit: "g", pts: 2.5 },
            { name: "Queso Roquefort / Cabrales / Azul", qty: 30, unit: "g", pts: 3.5 },
            { name: "Loncha de queso tipo tranchete", qty: 1, unit: "ud", pts: 1.5 },
            { name: "Crema de queso para untar", qty: 2, unit: "ct", pts: 2 },

            // DULCES Y POSTRES
            { name: "Azúcar o Fructosa", qty: 15, unit: "g", pts: 1 },
            { name: "Chocolate con leche o blanco", qty: 15, unit: "g", pts: 3 },
            { name: "Chocolate negro (>70% cacao)", qty: 15, unit: "g", pts: 1 },
            { name: "Crema de cacao (Nutella/Nocilla)", qty: 15, unit: "g", pts: 1.5 },
            { name: "Churros", qty: 4, unit: "ud", pts: 8 },
            { name: "Croissant, Magdalena, Ensaimada", qty: 1, unit: "ud", pts: 5 },
            { name: "Galleta tipo Maria", qty: 2, unit: "ud", pts: 1 },
            { name: "Helado de sabores", qty: 1, unit: "bola", pts: 4 },

            { name: "Arroz con leche", qty: 1, unit: "ud", pts: 3 }
        ];

        if(confirm(`Se van a instalar ${catalogo.length} alimentos de tu libro.\n\n¿Deseas continuar?`)) {
            for(let f of catalogo) {
                await addDoc(collection(db, "alimentos"), {
                    uid: userUID, name: f.name, isPdf: true, baseQty: f.qty, unit: f.unit, basePts: f.pts, cal: 0, fat: 0, gram: f.qty, pts: f.pts 
                });
            }
            alert("¡Todos los alimentos se han guardado en tu lista!");
        }
    };

    function iniciarApp() {
        if (!userUID) return;
        onSnapshot(query(collection(db, "alimentos"), where("uid", "==", userUID)), (snap) => {
            foods = snap.docs.map(d => ({ id: d.id, ...d.data() })); window.renderList();
            const sel = document.getElementById('buy-select'); sel.innerHTML = '<option value="">-- Seleccionar --</option>';
            foods.forEach(f => sel.innerHTML += `<option value="${f.name}">${f.name}</option>`);
        });
        onSnapshot(doc(db, "consumos", userUID), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if(data.date === new Date().toLocaleDateString()) { dayData = data; } else { archiveDay(data); dayData = { date: new Date().toLocaleDateString(), used: 0, items: [] }; setDoc(doc(db, "consumos", userUID), dayData); }
                renderDay();
            } else { setDoc(doc(db, "consumos", userUID), dayData); }
        });
        onSnapshot(query(collection(db, "compras"), where("uid", "==", userUID)), (snap) => { buyList = snap.docs.map(d => ({ id: d.id, ...d.data() })); window.renderBuy(); });
    }

    window.doCalc = () => {
        const cal = parseFloat(document.getElementById('c-cal').value) || 0; const fat = parseFloat(document.getElementById('c-fat').value) || 0; const gr = parseFloat(document.getElementById('c-gram').value) || 0;
        const extra = (cal / 50) + (fat / 12); document.getElementById('res-extra').innerText = "Extra: " + extra.toFixed(3); document.getElementById('res-pts').innerText = ((extra * gr) / 100).toFixed(2);
    };

    window.saveFood = async () => {
        const id = document.getElementById('edit-id').value;
        const data = { uid: userUID, name: document.getElementById('c-name').value || 'Sin nombre', cal: document.getElementById('c-cal').value, fat: document.getElementById('c-fat').value, gram: document.getElementById('c-gram').value, pts: document.getElementById('res-pts').innerText, isPdf: false };
        id ? await updateDoc(doc(db, "alimentos", id), data) : await addDoc(collection(db, "alimentos"), data);
        document.getElementById('c-name').value = ''; document.getElementById('edit-id').value = ''; window.tab('list');
    };

    window.renderList = () => {
        const q = document.getElementById('search').value.toLowerCase();
        const div = document.getElementById('food-list'); div.innerHTML = foods.length ? '' : 'Lista vacía.';
        foods.filter(f => f.name.toLowerCase().includes(q)).forEach(f => {
            let desc = f.isPdf ? `${f.basePts} pts por cada ${f.baseQty} ${f.unit}` : `${f.pts} pts (${f.gram}g)`;
            div.innerHTML += `<div class="item"><div class="info"><b>${f.name}</b><br><small style="color:#666">${desc}</small></div>
                <div class="actions"><button class="btn-edit" onclick="window.prepEdit('${f.id}')">✏️</button><button class="btn-add" onclick="window.eat('${f.id}')">➕</button><button class="btn-del" onclick="window.delFood('${f.id}')">🗑️</button></div></div>`;
        });
    };

    window.eat = async (id) => {
        const f = foods.find(x => x.id === id);
        if (f.isPdf) {
            const input = prompt(`¿Qué cantidad de ${f.name} (${f.unit}) vas a comer?\n(Referencia: ${f.baseQty} ${f.unit} = ${f.basePts} pts)`, f.baseQty);
            if (input) {
                const consumido = parseFloat(input.replace(',', '.'));
                if (!isNaN(consumido)) {
                    let pts = 0;
                    if (f.basePts > 0) { pts = parseFloat(((consumido * f.basePts) / f.baseQty).toFixed(2)); } // Regla de tres si tiene puntos
                    
                    dayData.used += pts;
                    dayData.items.unshift({ id: Date.now(), name: f.name, pts: pts, gr: consumido + ' ' + f.unit, originalId: f.id });
                    await setDoc(doc(db, "consumos", userUID), dayData); window.tab('day');
                }
            }
        } else {
            const gr = prompt(`¿Cuántos gramos de ${f.name}?`, f.gram);
            if(gr) {
                const extra = (f.cal / 50) + (f.fat / 12); const pts = parseFloat(((extra * gr) / 100).toFixed(2));
                dayData.used += pts; dayData.items.unshift({ id: Date.now(), name: f.name, pts: pts, gr: gr + 'g', originalId: f.id });
                await setDoc(doc(db, "consumos", userUID), dayData); window.tab('day');
            }
        }
    };

    function renderDay() {
        document.getElementById('d-rem').innerText = (22 - dayData.used).toFixed(1); document.getElementById('d-used').innerText = dayData.used.toFixed(1);
        document.getElementById('day-log').innerHTML = dayData.items.map(i => `<div class="item"><div class="info"><b>${i.name}</b><br><small>${i.gr} = <b>${i.pts} pts</b></small></div><div class="actions"><button class="btn-edit" onclick="window.editDayItem(${i.id})">✏️</button><button class="btn-del" onclick="window.deleteDayItem(${i.id})">🗑️</button></div></div>`).join('');
    }

    window.editDayItem = async (timestampId) => {
        const item = dayData.items.find(i => i.id === timestampId);
        const f = foods.find(x => x.id === item.originalId);
        if(!f) return alert("El alimento original fue borrado de tu lista.");
        
        if (f.isPdf) {
            const oldQty = item.gr.match(/[\d.]+/)[0];
            const input = prompt(`Modificar cantidad en ${f.unit}:`, oldQty);
            if(input) {
                const consumido = parseFloat(input.replace(',', '.'));
                if (!isNaN(consumido)) {
                    let nuevosPts = 0;
                    if(f.basePts > 0) { nuevosPts = parseFloat(((consumido * f.basePts) / f.baseQty).toFixed(2)); }
                    
                    dayData.used = (dayData.used - item.pts) + nuevosPts; item.gr = consumido + ' ' + f.unit; item.pts = nuevosPts;
                    await setDoc(doc(db, "consumos", userUID), dayData);
                }
            }
        } else {
            const nuevoGr = prompt(`Modificar gramos:`, item.gr.replace('g', ''));
            if(nuevoGr) {
                const extra = (f.cal / 50) + (f.fat / 12); const nuevosPts = parseFloat(((extra * nuevoGr) / 100).toFixed(2));
                dayData.used = (dayData.used - item.pts) + nuevosPts; item.gr = nuevoGr + 'g'; item.pts = nuevosPts;
                await setDoc(doc(db, "consumos", userUID), dayData);
            }
        }
    };

    window.deleteDayItem = async (tid) => { const i = dayData.items.find(x => x.id === tid); dayData.used -= i.pts; dayData.items = dayData.items.filter(x => x.id !== tid); await setDoc(doc(db, "consumos", userUID), dayData); };
    window.addBuyItem = async () => { const val = document.getElementById('buy-input').value.trim(); if(val) { await addDoc(collection(db, "compras"), { uid: userUID, name: val, done: false, date: Date.now() }); document.getElementById('buy-input').value = ''; document.getElementById('buy-select').value=''; } };
    window.renderBuy = () => { const pen = document.getElementById('buy-list-pending'); const done = document.getElementById('buy-list-done'); pen.innerHTML = ''; done.innerHTML = ''; buyList.sort((a,b)=>b.date-a.date).forEach(i => { const h = `<div class="buy-item ${i.done?'done':''}"> <span style="flex:1" onclick="window.toggleBuy('${i.id}',${i.done})">${i.done?'✅':'▫️'} ${i.name}</span> <div><button onclick="window.editBuy('${i.id}','${i.name}')" style="background:none; border:none; color:orange;">✏️</button><button onclick="window.delBuy('${i.id}')" style="background:none; border:none; color:red; font-weight:bold;">✕</button></div></div>`; i.done ? done.innerHTML += h : pen.innerHTML += h; }); }
    window.toggleBuy = async (id, s) => await updateDoc(doc(db, "compras", id), { done: !s });
    window.delBuy = async (id) => { if(confirm('¿Borrar de la compra?')) await deleteDoc(doc(db, "compras", id)); };
    window.editBuy = async (id, old) => { const n = prompt("Editar:", old); if(n) await updateDoc(doc(db, "compras", id), { name: n }); };
    window.renderHist = async () => { const snap = await getDocs(query(collection(db, "historiales"), where("uid", "==", userUID))); document.getElementById('hist-list').innerHTML = snap.docs.map(d => d.data()).sort((a,b)=>b.date.localeCompare(a.date)).map(h => `<div class="hist-item"><div class="hist-head" onclick="this.nextElementSibling.style.display=(this.nextElementSibling.style.display=='block'?'none':'block')"><span>📅 ${h.date}</span><span style="color:var(--primary)">${h.used.toFixed(1)} pts</span></div><div class="hist-body">Inicio: 22.0 | Gastado: ${h.used.toFixed(1)}<hr>${h.items.map(i=>`<div>• ${i.name} (${i.gr}): <b>${i.pts}</b></div>`).join('')}</div></div>`).join(''); };
    window.tab = (v) => { document.querySelectorAll('.view, .tab').forEach(x => x.classList.remove('active')); document.getElementById('v-'+v).classList.add('active'); document.querySelectorAll('.tab').forEach(t => { if(t.innerText.toLowerCase().includes(v.substring(0,3))) t.classList.add('active'); }); if(v==='hist') window.renderHist(); };
    window.prepEdit = (id) => { const f = foods.find(x => x.id === id); document.getElementById('c-name').value = f.name; document.getElementById('c-cal').value = f.cal||0; document.getElementById('c-fat').value = f.fat||0; document.getElementById('c-gram').value = f.gram||0; document.getElementById('edit-id').value = f.id; window.tab('calc'); };
    window.delFood = async (id) => { if(confirm('¿Borrar alimento permanentemente?')) await deleteDoc(doc(db, "alimentos", id)); };
    window.resetDay = async () => { if(confirm('¿Borrar todos los consumos de hoy?')) { dayData.used = 0; dayData.items = []; await setDoc(doc(db, "consumos", userUID), dayData); } };
    async function archiveDay(d) { await setDoc(doc(collection(db, "historiales"), userUID + "_" + d.date.replace(/\//g, "-")), { ...d, uid: userUID }); }
</script>
</body>
