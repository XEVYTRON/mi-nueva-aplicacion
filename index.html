<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Puntos Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7B1FA2">
    <style>
        :root { --primary: #7B1FA2; --bg: #f4f7f9; --card: #ffffff; --accent: #CE93D8; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { background: var(--card); margin: 12px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .res-container { text-align: center; background: #f3e5f5; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid var(--primary); }
        .res-val { font-size: 4.5rem; font-weight: 900; color: var(--primary); display: block; line-height: 1; margin: 5px 0; }
        .btn { border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 10px; transition: 0.2s; }
        .btn-save { background: var(--primary); color: white; }
        .btn-edit { background: #FF9800; color: white; padding: 6px 10px; font-size: 0.8rem; border-radius: 5px; border:none; }
        .btn-add { background: #4CAF50; color: white; padding: 6px 10px; font-size: 0.8rem; border-radius: 5px; border:none; }
        .btn-del { background: #F44336; color: white; padding: 6px 10px; font-size: 0.8rem; border-radius: 5px; border:none; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 65px; z-index: 100; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #888; cursor: pointer; }
        .tab.active { color: var(--primary); border-top: 3px solid var(--primary); font-weight: bold; }
        .view { display: none; animation: fadeIn 0.2s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .actions { display: flex; gap: 8px; align-items: center; }
        .hist-item { border: 1px solid #ddd; margin-bottom: 10px; border-radius: 10px; background: white; }
        .hist-head { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .hist-body { padding: 0 15px 15px 15px; display: none; border-top: 1px solid #eee; font-size: 0.9rem; color: #555; }
        .buy-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px dotted #ccc; }
        .buy-item.done span { text-decoration: line-through; color: #aaa; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; padding: 20px; }
        #app-content { display: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card" style="width: 100%; max-width: 320px;">
        <h2 style="text-align:center; color:var(--primary);">Acceso Privado</h2>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Contraseña">
        
        <button class="btn btn-save" id="btnLogin">Entrar</button>
        <button class="btn" id="btnSignup" style="background:#eee; margin-top:10px;">Crear Cuenta Nueva</button>

        <div style="text-align:center; font-size:0.7rem; color:#aaa; margin-top:20px;">Versión 7.0 (Catálogo Total + Historial Fixed)</div>
    </div>
</div>

<div id="app-content">
    <header>
        <span>Mis Puntos Pro</span>
        <button id="btnLogout" style="background:none; border:none; color:white; font-size:0.8rem; text-decoration: underline;">Salir</button>
    </header>

    <div id="v-calc" class="view active">
        <div class="card">
            <label>Nombre del Alimento</label><input type="text" id="c-name" placeholder="Ej: Pechuga casera">
            <label>Calorías (100g)</label><input type="number" id="c-cal">
            <label>Grasas (100g)</label><input type="number" id="c-fat">
            <label>Gramos Porción</label><input type="number" id="c-gram">
            <div class="res-container">
                <span id="res-extra" style="font-size: 0.7rem; color: #666;">Extra: 0.000</span><br>
                <span class="res-val" id="res-pts">0</span>
                <span style="font-weight: bold; color: var(--primary)">PUNTOS</span>
            </div>
            <input type="hidden" id="edit-id">
            <button class="btn btn-save" id="btnSaveFood">💾 Guardar en mi lista</button>
        </div>
    </div>

    <div id="v-list" class="view">
        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button id="btnImportar" style="flex:1; background:var(--primary); color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">📥 Importar PDF</button>
                <button id="btnBorrarTodo" style="background:#F44336; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">🗑️ Borrar Lista</button>
            </div>
            <input type="text" id="search" placeholder="🔍 Buscar alimento...">
            <div id="food-list">Cargando...</div>
        </div>
    </div>

    <div id="v-day" class="view">
        <div class="card" style="text-align:center;">
            <label style="color:var(--primary)">PUNTOS RESTANTES</label>
            <span class="res-val" id="d-rem">22</span>
            <p>Gastado: <b id="d-used" style="color:var(--primary)">0</b> de 22 pts</p>
        </div>
        <div class="card">
            <label>RESUMEN DE HOY:</label>
            <div id="day-log"></div>
            <button class="btn" style="background:#f3e5f5; color:var(--primary); margin-top:20px; font-size:0.8rem;" id="btnResetDay">Borrar todo el día</button>
        </div>
    </div>

    <div id="v-buy" class="view">
        <div class="card">
            <label>Añadir a la lista</label>
            <div style="display:flex; gap:8px;">
                <input type="text" id="buy-input" placeholder="Escribir producto..." style="margin:0;">
                <button class="btn-add" id="btnAddBuy" style="padding:0 20px; font-size:1.5rem;">+</button>
            </div>
            <label style="margin-top:10px;">O elegir de mis alimentos:</label>
            <select id="buy-select"><option value="">-- Seleccionar --</option></select>
        </div>
        <div class="card">
            <label>🛒 PENDIENTE</label><div id="buy-list-pending"></div>
            <label style="margin-top:20px;">✅ COMPRADO</label><div id="buy-list-done"></div>
        </div>
    </div>

    <div id="v-hist" class="view"><div class="card"><label>HISTORIAL POR DÍAS</label><div id="hist-list"></div></div></div>

    <nav class="tab-bar">
        <div class="tab active" data-tab="calc"><span>🧮</span>Calc</div>
        <div class="tab" data-tab="list"><span>📖</span>Lista</div>
        <div class="tab" data-tab="day"><span>🍴</span>Hoy</div>
        <div class="tab" data-tab="buy"><span>🛒</span>Compra</div>
        <div class="tab" data-tab="hist"><span>📈</span>Hist</div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, doc, setDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAwv0RBFiAk-frLYK0LDyCyRduL2IVqOME",
      authDomain: "mispuntos-ea353.firebaseapp.com",
      projectId: "mispuntos-ea353",
      storageBucket: "mispuntos-ea353.firebasestorage.app",
      messagingSenderId: "762879678681",
      appId: "1:762879678681:web:68a2bc4677e547a57b86c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let userUID = null, foods = [], buyList = [], dayData = { used: 0, items: [], date: new Date().toLocaleDateString() };

    // --- BOTONES DE AUTENTICACIÓN (100% CABLEADOS) ---
    document.getElementById('btnLogin').addEventListener('click', async () => {
        const email = document.getElementById('auth-email').value; const pass = document.getElementById('auth-pass').value;
        if (!email || !pass) return alert("Escribe tu correo y contraseña.");
        try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Error al entrar: " + e.message); }
    });

    document.getElementById('btnSignup').addEventListener('click', async () => {
        const email = document.getElementById('auth-email').value; const pass = document.getElementById('auth-pass').value;
        if (!email || !pass) return alert("Escribe tu correo y contraseña.");
        try { await createUserWithEmailAndPassword(auth, email, pass); alert("¡Cuenta creada!"); } catch (e) { alert("Error al registrar: " + e.message); }
    });

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
        if (user) { 
            userUID = user.uid; document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-content').style.display = 'block'; iniciarApp(); 
        } else { 
            userUID = null; document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app-content').style.display = 'none'; 
        }
    });

    function iniciarApp() {
        onSnapshot(query(collection(db, "alimentos"), where("uid", "==", userUID)), (snap) => {
            foods = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderList();
            const sel = document.getElementById('buy-select'); sel.innerHTML = '<option value="">-- Seleccionar --</option>';
            foods.forEach(f => sel.innerHTML += `<option value="${f.name}">${f.name}</option>`);
        });

        // --- SISTEMA DE HISTORIAL ARREGLADO ---
        onSnapshot(doc(db, "consumos", userUID), async (docSnap) => {
            const hoyStr = new Date().toLocaleDateString();
            if (docSnap.exists()) {
                const data = docSnap.data();
                if(data.date === hoyStr) { 
                    dayData = data; 
                    renderDay();
                } else { 
                    // ES UN DÍA NUEVO. Aseguramos que se guarda ayer antes de borrar.
                    if (data.items && data.items.length > 0) {
                        const nombreHistorial = userUID + "_" + data.date.replace(/\//g, "-");
                        await setDoc(doc(db, "historiales", nombreHistorial), { ...data, uid: userUID });
                    }
                    // Ahora sí, ponemos el contador a cero para hoy.
                    dayData = { date: hoyStr, used: 0, items: [] }; 
                    await setDoc(doc(db, "consumos", userUID), dayData); 
                    renderDay();
                    renderHist();
                }
            } else { 
                dayData = { date: hoyStr, used: 0, items: [] }; 
                await setDoc(doc(db, "consumos", userUID), dayData); 
                renderDay(); 
            }
        });

        onSnapshot(query(collection(db, "compras"), where("uid", "==", userUID)), (snap) => { 
            buyList = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderBuy(); 
        });
    }

    // --- CÁLCULO ---
    const doCalc = () => {
        const cal = parseFloat(document.getElementById('c-cal').value) || 0; const fat = parseFloat(document.getElementById('c-fat').value) || 0; const gr = parseFloat(document.getElementById('c-gram').value) || 0;
        const extra = (cal / 50) + (fat / 12); document.getElementById('res-extra').innerText = "Extra: " + extra.toFixed(3); document.getElementById('res-pts').innerText = ((extra * gr) / 100).toFixed(2);
    };
    document.getElementById('c-cal').addEventListener('input', doCalc);
    document.getElementById('c-fat').addEventListener('input', doCalc);
    document.getElementById('c-gram').addEventListener('input', doCalc);

    document.getElementById('btnSaveFood').addEventListener('click', async () => {
        const id = document.getElementById('edit-id').value;
        const data = { uid: userUID, name: document.getElementById('c-name').value || 'Sin nombre', cal: document.getElementById('c-cal').value, fat: document.getElementById('c-fat').value, gram: document.getElementById('c-gram').value, pts: document.getElementById('res-pts').innerText, isPdf: false };
        id ? await updateDoc(doc(db, "alimentos", id), data) : await addDoc(collection(db, "alimentos"), data);
        document.getElementById('c-name').value = ''; document.getElementById('edit-id').value = ''; tab('list');
    });

    // --- RENDER DE LISTA ---
    function renderList() {
        const q = document.getElementById('search').value.toLowerCase();
        const div = document.getElementById('food-list'); div.innerHTML = foods.length ? '' : 'Lista vacía.';
        foods.filter(f => f.name.toLowerCase().includes(q)).forEach(f => {
            let desc = f.isPdf ? `<span style="color:var(--primary); font-weight:bold;">${f.basePts} pts</span> por cada ${f.baseQty} ${f.unit}` : `${f.pts} pts (${f.gram}g)`;
            div.innerHTML += `<div class="item"><div class="info"><b>${f.name}</b><br><small style="color:#666">${desc}</small></div>
                <div class="actions"><button class="btn-edit" data-edit="${f.id}">✏️</button><button class="btn-add" data-eat="${f.id}">➕</button><button class="btn-del" data-del="${f.id}">🗑️</button></div></div>`;
        });
        
        document.querySelectorAll('button[data-eat]').forEach(btn => btn.onclick = () => eat(btn.getAttribute('data-eat')));
        document.querySelectorAll('button[data-edit]').forEach(btn => btn.onclick = () => prepEdit(btn.getAttribute('data-edit')));
        document.querySelectorAll('button[data-del]').forEach(btn => btn.onclick = async () => { if(confirm('¿Borrar alimento?')) await deleteDoc(doc(db, "alimentos", btn.getAttribute('data-del'))); });
    }
    document.getElementById('search').addEventListener('input', renderList);

    function prepEdit(id) {
        const f = foods.find(x => x.id === id);
        document.getElementById('c-name').value = f.name; document.getElementById('c-cal').value = f.cal||0; document.getElementById('c-fat').value = f.fat||0; document.getElementById('c-gram').value = f.gram||0; document.getElementById('edit-id').value = f.id; 
        doCalc(); tab('calc');
    }

    async function eat(id) {
        const f = foods.find(x => x.id === id); if(!f) return;
        if (f.isPdf) {
            const input = prompt(`¿Cantidad de ${f.name} (${f.unit}) vas a comer?\n(Referencia: ${f.baseQty} ${f.unit} = ${f.basePts} pts)`, f.baseQty);
            if (input) {
                const consumido = parseFloat(input.replace(',', '.'));
                if (!isNaN(consumido)) {
                    let pts = 0; if (f.basePts > 0) { pts = parseFloat(((consumido * f.basePts) / f.baseQty).toFixed(2)); }
                    dayData.used += pts; dayData.items.unshift({ id: Date.now(), name: f.name, pts: pts, gr: consumido + ' ' + f.unit, originalId: f.id });
                    await setDoc(doc(db, "consumos", userUID), dayData); tab('day');
                }
            }
        } else {
            const gr = prompt(`¿Cuántos gramos de ${f.name}?`, f.gram);
            if(gr) {
                const extra = (f.cal / 50) + (f.fat / 12); const pts = parseFloat(((extra * gr) / 100).toFixed(2));
                dayData.used += pts; dayData.items.unshift({ id: Date.now(), name: f.name, pts: pts, gr: gr + 'g', originalId: f.id });
                await setDoc(doc(db, "consumos", userUID), dayData); tab('day');
            }
        }
    }

    function renderDay() {
        document.getElementById('d-rem').innerText = (22 - dayData.used).toFixed(1); document.getElementById('d-used').innerText = dayData.used.toFixed(1);
        document.getElementById('day-log').innerHTML = dayData.items.map(i => `<div class="item"><div class="info"><b>${i.name}</b><br><small>${i.gr} = <b>${i.pts} pts</b></small></div><div class="actions"><button class="btn-edit" data-editday="${i.id}">✏️</button><button class="btn-del" data-delday="${i.id}">🗑️</button></div></div>`).join('');
        document.querySelectorAll('button[data-delday]').forEach(btn => btn.onclick = () => deleteDayItem(parseInt(btn.getAttribute('data-delday'))));
        document.querySelectorAll('button[data-editday]').forEach(btn => btn.onclick = () => editDayItem(parseInt(btn.getAttribute('data-editday'))));
    }

    async function editDayItem(timestampId) {
        const item = dayData.items.find(i => i.id === timestampId); const f = foods.find(x => x.id === item.originalId);
        if(!f) return alert("El alimento original fue borrado de tu lista.");
        if (f.isPdf) {
            const oldQty = item.gr.match(/[\d.]+/)[0]; const input = prompt(`Modificar cantidad en ${f.unit}:`, oldQty);
            if(input) {
                const consumido = parseFloat(input.replace(',', '.'));
                if (!isNaN(consumido)) {
                    let nuevosPts = 0; if(f.basePts > 0) { nuevosPts = parseFloat(((consumido * f.basePts) / f.baseQty).toFixed(2)); }
                    dayData.used = (dayData.used - item.pts) + nuevosPts; item.gr = consumido + ' ' + f.unit; item.pts = nuevosPts; await setDoc(doc(db, "consumos", userUID), dayData);
                }
            }
        } else {
            const nuevoGr = prompt(`Modificar gramos:`, item.gr.replace('g', ''));
            if(nuevoGr) {
                const extra = (f.cal / 50) + (f.fat / 12); const nuevosPts = parseFloat(((extra * nuevoGr) / 100).toFixed(2));
                dayData.used = (dayData.used - item.pts) + nuevosPts; item.gr = nuevoGr + 'g'; item.pts = nuevosPts; await setDoc(doc(db, "consumos", userUID), dayData);
            }
        }
    }

    async function deleteDayItem(tid) { const i = dayData.items.find(x => x.id === tid); dayData.used -= i.pts; dayData.items = dayData.items.filter(x => x.id !== tid); await setDoc(doc(db, "consumos", userUID), dayData); }
    
    document.getElementById('btnResetDay').addEventListener('click', async () => {
        if(confirm('¿Borrar todos los consumos de hoy?')) { dayData.used = 0; dayData.items = []; await setDoc(doc(db, "consumos", userUID), dayData); }
    });

    document.getElementById('btnBorrarTodo').addEventListener('click', async () => {
        if (foods.length === 0) return alert("Tu lista ya está vacía.");
        if (confirm(`⚠️ ¡CUIDADO!\n\nVas a borrar TODOS tus alimentos guardados (${foods.length}).\n¿Estás seguro?`)) {
            try { await Promise.all(foods.map(f => deleteDoc(doc(db, "alimentos", f.id)))); alert("🗑️ Lista borrada."); } 
            catch (e) { alert("Error al borrar: " + e.message); }
        }
    });

    // COMPRAS
    document.getElementById('btnAddBuy').addEventListener('click', async () => {
        const val = document.getElementById('buy-input').value.trim(); 
        if(val) { await addDoc(collection(db, "compras"), { uid: userUID, name: val, done: false, date: Date.now() }); document.getElementById('buy-input').value = ''; document.getElementById('buy-select').value=''; }
    });
    document.getElementById('buy-select').addEventListener('change', (e) => document.getElementById('buy-input').value = e.target.value);
    
    function renderBuy() { 
        const pen = document.getElementById('buy-list-pending'); const done = document.getElementById('buy-list-done'); pen.innerHTML = ''; done.innerHTML = ''; 
        buyList.sort((a,b)=>b.date-a.date).forEach(i => { 
            const h = `<div class="buy-item ${i.done?'done':''}"> <span style="flex:1" data-tgbuy="${i.id}" data-st="${i.done}">${i.done?'✅':'▫️'} ${i.name}</span> <div><button class="btn-edit" data-editbuy="${i.id}" data-name="${i.name}">✏️</button> <button class="btn-del" data-delbuy="${i.id}">✕</button></div></div>`; 
            i.done ? done.innerHTML += h : pen.innerHTML += h; 
        }); 
        document.querySelectorAll('span[data-tgbuy]').forEach(s => s.onclick = async () => await updateDoc(doc(db, "compras", s.getAttribute('data-tgbuy')), { done: s.getAttribute('data-st') === 'false' }));
        document.querySelectorAll('button[data-delbuy]').forEach(b => b.onclick = async () => { if(confirm('¿Borrar?')) await deleteDoc(doc(db, "compras", b.getAttribute('data-delbuy'))); });
        document.querySelectorAll('button[data-editbuy]').forEach(b => b.onclick = async () => { const n = prompt("Editar:", b.getAttribute('data-name')); if(n) await updateDoc(doc(db, "compras", b.getAttribute('data-editbuy')), { name: n }); });
    }

    async function renderHist() {
        const snap = await getDocs(query(collection(db, "historiales"), where("uid", "==", userUID)));
        document.getElementById('hist-list').innerHTML = snap.docs.map(d => d.data()).sort((a,b)=>b.date.localeCompare(a.date)).map(h => `<div class="hist-item"><div class="hist-head" onclick="this.nextElementSibling.style.display=(this.nextElementSibling.style.display=='block'?'none':'block')"><span>📅 ${h.date}</span><span style="color:var(--primary)">${h.used.toFixed(1)} pts</span></div><div class="hist-body">Inicio: 22.0 | Gastado: ${h.used.toFixed(1)}<hr>${h.items.map(i=>`<div>• ${i.name} (${i.gr}): <b>${i.pts}</b></div>`).join('')}</div></div>`).join('');
    }

    function tab(v) { 
        document.querySelectorAll('.view, .tab').forEach(x => x.classList.remove('active')); 
        document.getElementById('v-'+v).classList.add('active'); 
        document.querySelector(`.tab[data-tab="${v}"]`).classList.add('active'); 
        if(v === 'hist') renderHist();
    }
    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => tab(t.getAttribute('data-tab'))));

    // --- GRAN CATÁLOGO DEL PDF COMPLETO (+280 ALIMENTOS) ---
    document.getElementById('btnImportar').addEventListener('click', async () => {
        const catalogo = [
            { name: "Verduras, Hortalizas, Algas y Champiñones", qty: 1, unit: "ración", pts: 0 },
            { name: "Frutas naturales (Manzana, Pera, Plátano...)", qty: 1, unit: "ración", pts: 0 },
            { name: "Clara de huevo", qty: 1, unit: "ud", pts: 0 },
            { name: "Gaseosa / Refresco Light o Zero", qty: 1, unit: "lata", pts: 0 },
            { name: "Yogur 0% natural (1 al día)", qty: 1, unit: "ud", pts: 0 },
            { name: "Caldo casero desgrasado / Cubito de caldo", qty: 1, unit: "ración", pts: 0 },
            { name: "Cremas frescas de Verduras", qty: 1, unit: "ración", pts: 0 },
            { name: "Edulcorante, Sacarina, Estevia", qty: 1, unit: "ración", pts: 0 },
